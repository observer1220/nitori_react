name: TMAS Security Scan

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  tmas-scan:
    name: TMAS Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run TMAS Scan
        uses: trendmicro/tmas-scan-action@v3   # 建議使用 v3 或最新 major version
        with:
          version: '2'                        # '2' = 最新 v2.x.x 版本
          vulnerabilitiesScan: true
          secretsScan: true
          malwareScan: false                  # Malware 目前主要支援容器映像
          artifact: dir:.                     # 掃描整個 repository
          additionalArgs: --region=ap-southeast-1   # 改成你的 Vision One 區域
          tmasApiKey: ${{ secrets.TMAS_API_KEY }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}  # 用來在 PR 上留言掃描結果
